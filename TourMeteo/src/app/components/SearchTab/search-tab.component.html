<div class="mb-6 bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6">
  <h2 class="text-lg font-bold text-slate-800 mb-4">Rechercher la météo</h2>

  <div class="space-y-3">
    <!-- Cities input -->
    <div class="relative">
      <label class="block text-xs font-medium text-slate-500 mb-1">Villes (séparées par virgule)</label>
      <input
        type="text"
        placeholder="ex: Montpellier, Paris, Lyon"
        [(ngModel)]="cities"
        (input)="onCityInput()"
        (focus)="onCityFocus()"
        (blur)="onCityBlur()"
        autocomplete="off"
        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
      />
      <!-- Recent cities dropdown -->
      <div *ngIf="showSuggestions && citySuggestions.length > 0"
           class="absolute z-20 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-lg max-h-40 overflow-y-auto">
        <button *ngFor="let s of citySuggestions" type="button"
                (mousedown)="pickSuggestion(s)"
                class="w-full text-left px-3 py-2 text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors">
          📍 {{ s }}
        </button>
      </div>
    </div>

    <!-- Date input -->
    <div>
      <label class="block text-xs font-medium text-slate-500 mb-1">Date</label>
      <input
        type="date"
        [(ngModel)]="date"
        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
      />
    </div>

    <!-- Filter toggles -->
    <div class="flex flex-wrap gap-2 pt-1">
      <button type="button" (click)="toggleTemp()"
              class="px-3 py-1.5 rounded-full text-xs font-medium border transition-colors"
              [ngClass]="showTemp ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-slate-50 text-slate-400 border-slate-200'">
        🌡️ Température
      </button>
      <button type="button" (click)="toggleWind()"
              class="px-3 py-1.5 rounded-full text-xs font-medium border transition-colors"
              [ngClass]="showWind ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-slate-50 text-slate-400 border-slate-200'">
        💨 Vent
      </button>
      <button type="button" (click)="toggleSummary()"
              class="px-3 py-1.5 rounded-full text-xs font-medium border transition-colors"
              [ngClass]="showSummary ? 'bg-blue-100 text-blue-700 border-blue-200' : 'bg-slate-50 text-slate-400 border-slate-200'">
        ☁️ Météo globale
      </button>
    </div>
  </div>

  <!-- Submit button -->
  <button (click)="submit()"
          class="mt-4 w-full sm:w-auto bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white px-6 py-3 rounded-xl font-semibold text-sm transition-colors shadow-sm">
    Afficher la météo
  </button>
</div>
